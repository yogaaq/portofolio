<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Analisis Netflix</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.cards{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

    margin-bottom:30px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.card h2{
    color:#38bdf8;
    margin-bottom:10px;
}

.chart-box{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.back{
    display:inline-block;
    margin-top:20px;
    color:#38bdf8;
    text-decoration:none;
}

</style>
</head>
<body>

<div class="container">

    <h1>📊 Dashboard Analisis Netflix</h1>

    <div class="cards">

        <div class="card">
            <h2>8807</h2>
            <p>Total Konten</p>
        </div>

        <div class="card">
            <h2>6131</h2>
            <p>Movies</p>
        </div>

        <div class="card">
            <h2>2676</h2>
            <p>TV Shows</p>
        </div>

        <div class="card">
            <h2>2020</h2>
            <p>Tahun Terbanyak Rilis</p>
        </div>

    </div>

    <div class="chart-box">
        <canvas id="typeChart"></canvas>
    </div>

    <div class="chart-box">
        <canvas id="yearChart"></canvas>
    </div>

    <a href="../../index.html" class="back">
        ← Kembali ke Portfolio
    </a>

</div>

<script>

// Grafik Movie vs TV Show

new Chart(
document.getElementById("typeChart"),
{
    type:'pie',

    data:{
        labels:[
            'Movie',
            'TV Show'
        ],

        datasets:[{
            data:[
                6131,
                2676
            ]
        }]
    },

    options:{
        plugins:{
            title:{
                display:true,
                text:'Perbandingan Movie dan TV Show'
            }
        }
    }
});


// Grafik Tren Rilis

new Chart(
document.getElementById("yearChart"),
{
    type:'bar',

    data:{
        labels:[
            '2016',
            '2017',
            '2018',
            '2019',
            '2020',
            '2021'
        ],

        datasets:[{
            label:'Jumlah Konten',

            data:[
                400,
                650,
                900,
                1200,
                1500,
                1100
            ]
        }]
    },

    options:{
        plugins:{
            title:{
                display:true,
                text:'Tren Rilis Konten Netflix'
            }
        }
    }
});

</script>

</body>
</html>
