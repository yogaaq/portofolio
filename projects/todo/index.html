<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do List App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:500px;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.input-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
}

button{
    padding:12px 20px;
    cursor:pointer;
}

li{
    margin-top:15px;
    list-style:none;
    background:#334155;
    padding:10px;
    display:flex;
    justify-content:space-between;
}

a{
    color:#38bdf8;
}
</style>

</head>
<body>

<div class="container">

<h1>To Do List</h1>

<div class="input-box">
    <input type="text" id="task">
    <button onclick="addTask()">Tambah</button>
</div>

<ul id="list"></ul>

<br>

<a href="../../index.html">
← Kembali ke Portfolio
</a>

</div>

<script>
function addTask(){

    let task =
    document.getElementById("task");

    let li =
    document.createElement("li");

    li.innerHTML = `
        ${task.value}
        <button onclick="this.parentElement.remove()">
        Hapus
        </button>
    `;

    document
    .getElementById("list")
    .appendChild(li);

    task.value="";
}
</script>

</body>
</html>
