<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUD Penjualan Sepatu</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.form{
    display:grid;
    grid-template-columns:1fr 1fr 1fr auto;
    gap:10px;
    margin-bottom:20px;
}

input{
    padding:12px;
    border:none;
    border-radius:8px;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn-add{
    background:#38bdf8;
    color:#000;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
}

th,td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #334155;
}

.action-btn{
    padding:6px 12px;
    margin:0 3px;
}

.edit{
    background:orange;
}

.delete{
    background:red;
    color:white;
}

.back{
    display:inline-block;
    margin-top:20px;
    color:#38bdf8;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="container">

    <h1> CRUD Penjualan Sepatu</h1>

    <div class="form">
        <input type="text" id="nama" placeholder="Nama Sepatu">
        <input type="text" id="merk" placeholder="Merk">
        <input type="number" id="harga" placeholder="Harga">
        <button class="btn-add" onclick="tambahData()">
            Tambah
        </button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nama</th>
                <th>Merk</th>
                <th>Harga</th>
                <th>Aksi</th>
            </tr>
        </thead>

        <tbody id="dataSepatu">

        </tbody>
    </table>

    <a href="../../index.html" class="back">
        ← Kembali ke Portfolio
    </a>

</div>

<script>

let data = [];
let editIndex = -1;

function renderData(){

    let tbody =
    document.getElementById("dataSepatu");

    tbody.innerHTML = "";

    data.forEach((sepatu,index)=>{

        tbody.innerHTML += `
        <tr>
            <td>${sepatu.nama}</td>
            <td>${sepatu.merk}</td>
            <td>Rp ${sepatu.harga}</td>

            <td>
                <button
                class="action-btn edit"
                onclick="editData(${index})">
                Edit
                </button>

                <button
                class="action-btn delete"
                onclick="hapusData(${index})">
                Hapus
                </button>
            </td>
        </tr>
        `;
    });
}

function tambahData(){

    let nama =
    document.getElementById("nama").value;

    let merk =
    document.getElementById("merk").value;

    let harga =
    document.getElementById("harga").value;

    if(
        nama === "" ||
        merk === "" ||
        harga === ""
    ){
        alert("Isi semua data!");
        return;
    }

    if(editIndex === -1){

        data.push({
            nama,
            merk,
            harga
        });

    }else{

        data[editIndex] = {
            nama,
            merk,
            harga
        };

        editIndex = -1;
    }

    document.getElementById("nama").value="";
    document.getElementById("merk").value="";
    document.getElementById("harga").value="";

    renderData();
}

function hapusData(index){

    data.splice(index,1);

    renderData();
}

function editData(index){

    document.getElementById("nama").value =
    data[index].nama;

    document.getElementById("merk").value =
    data[index].merk;

    document.getElementById("harga").value =
    data[index].harga;

    editIndex = index;
}

renderData();

</script>

</body>
</html>
